<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CONTACT // VISUAL ARCHIVE</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a; color: #ffffff; font-family: sans-serif;">

    <nav style="display: flex; justify-content: flex-end; padding: 30px 6%; border-bottom: 1px solid #222;">
        <div style="display: flex; gap: 40px;">
            <a href="index.html" style="text-decoration: none; color: #888; font-size: 12px; text-transform: uppercase;">Home</a>
            <a href="design.html" style="text-decoration: none; color: #888; font-size: 12px; text-transform: uppercase;">Design</a>
            <a href="photography.html" style="text-decoration: none; color: #888; font-size: 12px; text-transform: uppercase;">Photography</a>
            <a href="contact.html" style="text-decoration: none; color: #fff; font-size: 12px; text-transform: uppercase;">Contact</a>
        </div>
    </nav>

    <div style="height: 60vh; background: url('886A3118.jpg') center/cover no-repeat; filter: grayscale(100%) contrast(1.2); border-bottom: 1px solid #222;">
    </div>

    <div style="padding: 60px 6%;">
        <div style="border-left: 8px solid #d4af37; padding-left: 25px; margin-bottom: 60px;">
            <h1 style="margin: 0; font-size: 45px; text-transform: uppercase; font-weight: 900; letter-spacing: -1px;">Work with me</h1>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 100px;">
            <div>
                <span style="color: #d4af37; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px;">// INQUIRIES</span>
                <p style="font-size: 18px; line-height: 1.6; color: #ccc; margin-top: 20px;">
                    Available for commercial shoots, track day coverage, and visual identity consulting. Based in Southern California, available worldwide.
                </p>
                <div style="margin-top: 40px;">
                    <p style="font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; color: #444;">Status</p>
                    <p style="color: #fff; font-size: 24px; font-weight: 900; margin: 0;">OPEN FOR COMMISSIONS</p>
                </div>
            </div>

            <form style="display: flex; flex-direction: column; gap: 20px;">
                <input type="text" placeholder="NAME" style="background: #111; border: 1px solid #222; padding: 15px; color: #fff; font-family: sans-serif; outline: none; font-size: 12px; letter-spacing: 1px;">
                <input type="email" placeholder="EMAIL" style="background: #111; border: 1px solid #222; padding: 15px; color: #fff; font-family: sans-serif; outline: none; font-size: 12px; letter-spacing: 1px;">
                <textarea placeholder="PROJECT DETAILS" rows="5" style="background: #111; border: 1px solid #222; padding: 15px; color: #fff; font-family: sans-serif; outline: none; font-size: 12px; letter-spacing: 1px;"></textarea>
                <button type="submit" style="background: #d4af37; color: #000; border: none; padding: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 3px;">Send Message</button>
            </form>
        </div>
    </div>

    <footer style="padding: 40px 6%; border-top: 1px solid #111; text-align: center;">
        <p style="font-size: 10px; color: #222; text-transform: uppercase; letter-spacing: 3px;">© 2026 // SPEED ARCHIVE</p>
    </footer>

</body>
</html>
