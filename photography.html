<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VISUAL ARCHIVE</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #d4af37;
            --border: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        nav {
            display: flex; 
            justify-content: flex-end; 
            padding: 30px 6%; 
            position: fixed; 
            width: 88%; 
            z-index: 100; 
            background: rgba(10,10,10,0.75); 
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        nav a {
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            transition: color 0.3s ease;
        }

        .container {
            padding: 160px 6% 80px 6%;
        }

        /* The "Justified" Gallery Fix */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .photo-wrap {
            height: 300px; /* Adjust this to change how many photos per row */
            flex-grow: 1;
            background: #111;
            overflow: hidden;
            position: relative;
        }

        /* This ensures landscape photos take up more horizontal space */
        .photo-wrap img {
            max-height: 100%;
            min-width: 100%;
            object-fit: cover;
            vertical-align: bottom;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Makes the last row align left instead of stretching weirdly */
        .gallery::after {
            content: "";
            flex-grow: 1000;
        }

        .photo-wrap:hover img {
            transform: scale(1.05);
        }

        .footer-text {
            font-size: 10px; 
            color: #444; 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
